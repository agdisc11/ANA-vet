# nginx para ANA-vet en una sola instancia EC2.
#
# La clave de todo el despliegue: frontend y API se sirven desde el MISMO
# origen. Eso elimina de un plumazo tres problemas:
#   - CORS: no hay petición cross-origin que autorizar.
#   - Contenido mixto: no hay un HTTPS llamando a un HTTP.
#   - IP cambiante: el frontend llama a `/api` (relativo), así que la IP
#     pública de la sesión del Learner Lab puede cambiar sin rebuild.
#
# Instalar en: /etc/nginx/conf.d/anavet.conf

server {
    listen 80 default_server;
    server_name _;

    # El build de Vite (frontend/clinica-vet-frontend/build)
    root /var/www/anavet;
    index index.html;

    # Los archivos con hash en el nombre no cambian nunca: caché larga.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → Express. La barra final en proxy_pass es intencional: nginx
    # sustituye el prefijo /api/ en vez de concatenarlo, y el backend
    # sigue montando sus rutas bajo /api (index.js).
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # La generación de PDFs puede tardar más que el default de 60s.
        proxy_read_timeout 120s;
    }

    # SPA: cualquier ruta desconocida la resuelve React Router.
    # Sin esto, recargar en /pacientes o abrir un /carnet/<token>
    # compartido devuelve 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 5m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
